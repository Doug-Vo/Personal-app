<svg
   viewBox="0 0 100 100"
   width="80"
   height="80"
   version="1.1"
   id="piglet-svg"
   xmlns="http://www.w3.org/2000/svg"
   style="cursor:pointer; overflow:visible;">

  <style>
    #piglet-svg {
      transform-origin: 50px 70px;
      transition: transform 0.1s ease;
    }

    @keyframes idle-sway {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(2deg); }
      75%       { transform: rotate(-2deg); }
    }

    @keyframes bounce {
      0%   { transform: scale(1) translateY(0); }
      20%  { transform: scale(1.18, 0.85) translateY(4px); }
      50%  { transform: scale(0.9, 1.15) translateY(-14px); }
      70%  { transform: scale(1.08, 0.95) translateY(2px); }
      85%  { transform: scale(0.97, 1.04) translateY(-4px); }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      20%  { transform: rotate(-8deg); }
      40%  { transform: rotate(8deg); }
      60%  { transform: rotate(-5deg); }
      80%  { transform: rotate(5deg); }
    }

    @keyframes spin-happy {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }

    #piglet-group {
      transform-origin: 50px 60px;
      animation: idle-sway 3s ease-in-out infinite;
    }

    #piglet-group.bounce { animation: bounce 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards; }
    #piglet-group.wiggle { animation: wiggle 0.5s ease-in-out forwards; }
    #piglet-group.spin   { animation: spin-happy 0.7s ease-in-out forwards; }

    .heart {
      opacity: 0;
      transform-origin: center;
      pointer-events: none;
    }

    @keyframes heart-pop {
      0%   { opacity: 0; transform: scale(0) translateY(0); }
      30%  { opacity: 1; transform: scale(1.2) translateY(-8px); }
      70%  { opacity: 1; transform: scale(1) translateY(-18px); }
      100% { opacity: 0; transform: scale(0.8) translateY(-28px); }
    }

    .heart.pop { animation: heart-pop 0.8s ease-out forwards; }

    .star { opacity: 0; pointer-events: none; }

    @keyframes star-burst {
      0%   { opacity: 0; transform: scale(0) rotate(0deg); }
      40%  { opacity: 1; transform: scale(1.3) rotate(180deg); }
      100% { opacity: 0; transform: scale(0) rotate(360deg); }
    }

    .star.burst { animation: star-burst 0.7s ease-out forwards; }

    #eye-left, #eye-right { transition: ry 0.2s ease; }
  </style>
