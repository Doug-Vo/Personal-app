<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Ỉn Ỉn — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='image/piglet.png') }}">
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.classList.add('dark');
        })();
    </script>
</head>
<body class="page-body auth-page-body">

<div class="auth-scene">

    <!-- Decorative blobs -->
    <div class="auth-blob auth-blob-1"></div>
    <div class="auth-blob auth-blob-2"></div>

    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Piglet header -->
            <div class="auth-card-piglet-wrap">
                <img src="{{ url_for('static', filename='image/piglet.png') }}"
                     alt="Ỉn" class="auth-card-piglet" id="auth-piglet">
            </div>

            <h1 class="auth-card-brand">Ỉn Ỉn</h1>
            <p class="auth-subtitle">Welcome back 🌿 Sign in to continue</p>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="auth-alert auth-alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="auth-field">
                    <label class="auth-label" for="username">Username</label>
                    <div class="auth-input-wrap">
                        <span class="auth-input-icon">👤</span>
                        <input id="username" type="text" name="username" class="auth-input auth-input-icon-pad"
                               placeholder="Your username" required autocomplete="username">
                    </div>
                </div>

                <div class="auth-field">
                    <label class="auth-label" for="password">Password</label>
                    <div class="auth-input-wrap">
                        <span class="auth-input-icon">🔒</span>
                        <input id="password" type="password" name="password" class="auth-input auth-input-icon-pad"
                               placeholder="Your password" required autocomplete="current-password">
                        <button type="button" class="auth-eye-btn" id="toggle-pw" tabindex="-1">👁</button>
                    </div>
                </div>

                <button type="submit" class="auth-button">Sign In →</button>
            </form>

            <div class="auth-divider"><span>or</span></div>

            <p class="auth-switch">
                No account yet?
                <a href="{{ url_for('register') }}" class="auth-link">Register here</a>
            </p>
            <p class="auth-switch" style="margin-top:0.4rem;">
                <a href="{{ url_for('home') }}" class="auth-link auth-link-muted">Continue without account →</a>
            </p>

        </div>
    </div>
</div>

<script>
    // Show/hide password
    document.getElementById('toggle-pw')?.addEventListener('click', () => {
        const inp = document.getElementById('password');
        inp.type = inp.type === 'password' ? 'text' : 'password';
    });
    // Piglet bounce on click
    document.getElementById('auth-piglet')?.addEventListener('click', function() {
        this.style.transform = 'scale(1.3) rotate(10deg)';
        setTimeout(() => { this.style.transform = ''; }, 300);
    });
</script>
</body>
</html>
