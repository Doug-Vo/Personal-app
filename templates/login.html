<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>PeTS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-body">
    <div class="auth-wrapper">

        <div class="auth-card">
            <img src="{{ url_for('static', filename='piglet.svg') }}" alt="PeTS" class="auth-piglet">
            <h1 class="header-title">PeTS</h1>
            <p class="auth-subtitle">Sign in to your account</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for msg in messages %}
                        <div class="auth-alert {{ 'auth-alert-error' if msg.type == 'error' else 'auth-alert-success' }}">
                            {{ msg.message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="auth-field">
                    <label class="auth-label">Username</label>
                    <input type="text" name="username" class="auth-input" placeholder="Enter your username" required autocomplete="username">
                </div>

                <div class="auth-field">
                    <label class="auth-label">Password</label>
                    <input type="password" name="password" class="auth-input" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <button type="submit" class="auth-button">Sign In</button>
            </form>

            <p class="auth-switch">
                Don't have an account? <a href="{{ url_for('register') }}" class="auth-link">Register here</a>
            </p>
            <p class="auth-switch">
                <a href="{{ url_for('home') }}" class="auth-link">Continue without account →</a>
            </p>
        </div>

    </div>
    <script>
        // Apply saved theme on load
        if (localStorage.getItem('theme') === 'dark' ||
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
